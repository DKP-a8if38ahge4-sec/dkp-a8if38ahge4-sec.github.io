<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projekte &mdash; Die Kavallerie</title>

  <!-- Kava Design System Tokens -->
  <link rel="stylesheet" href="./dk-designsystem/styles.css" />

  <style>
    /* Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-base, 'Helvetica Neue', sans-serif);
      background-color: var(--color-bg, #F2F4F7);
      color: var(--color-text, #1D1D1D);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background-color: var(--color-accent, #FF003C);
      color: var(--color-white, #FFFFFF);
      padding: 3rem 2rem 2.5rem;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    header h1 {
      font-family: var(--font-headline, 'Helvetica Neue', sans-serif);
      font-size: var(--font-size-headline-h2, 80px);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.95;
      color: var(--color-white, #FFFFFF);
      letter-spacing: -0.01em;
    }

    /* Main */
    main {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 3rem auto;
      padding: 0 2rem;
    }

    .section-label {
      font-family: var(--font-base, 'Helvetica Neue', sans-serif);
      font-size: var(--font-size-sub-headline, 14px);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text, #1D1D1D);
      opacity: 0.4;
      margin-bottom: 1.5rem;
    }

    /* Project List */
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-left: -1rem;
      margin-right: -1rem;
      border-top: 1px solid var(--color-black, #1D1D1D);
    }

    /* Project Row */
    .project-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--color-black, #1D1D1D);
      text-decoration: none;
      color: var(--color-text, #1D1D1D);
      transition: background-color 0.15s ease;
      gap: 1rem;
    }

    .project-row:hover {
      background-color: var(--color-accent, #FF003C);
      color: var(--color-white, #FFFFFF);
    }

    .project-row:hover .project-url {
      color: rgba(255, 255, 255, 0.65);
      opacity: 1;
    }

    .project-row:hover .project-arrow {
      color: var(--color-white, #FFFFFF);
    }

    .project-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .project-name {
      font-family: var(--font-headline, 'Helvetica Neue', sans-serif);
      font-size: var(--font-size-headline-h5, 40px);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1;
    }

    .project-url {
      font-family: var(--font-base, 'Helvetica Neue', sans-serif);
      font-size: var(--font-size-copy-2xsmall, 14px);
      color: var(--color-text, #1D1D1D);
      opacity: 0.5;
      transition: color 0.15s ease, opacity 0.15s ease;
    }

    .project-arrow {
      font-size: 1.75rem;
      color: var(--color-accent, #FF003C);
      flex-shrink: 0;
      transition: color 0.15s ease;
    }

    /* Footer */
    footer {
      padding: 2rem;
      font-size: var(--font-size-copy-2xsmall, 14px);
      color: var(--color-text, #1D1D1D);
      opacity: 0.4;
      border-top: 1px solid var(--color-black, #1D1D1D);
      text-align: left;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    @media (max-width: 640px) {
      header h1 {
        font-size: var(--font-size-headline-h2, 40px);
      }
      .project-name {
        font-size: var(--font-size-headline-h5, 20px);
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>Projekte</h1>
    </div>
  </header>

  <main>
    <p class="section-label">Alle Projekte</p>

    <div class="project-list">

      <!-- Beispielseite -->
      <a href="./beispielseite/" class="project-row">
        <div class="project-info">
          <span class="project-name">Beispielseite</span>
          <span class="project-url">/beispielseite/</span>
        </div>
        <span class="project-arrow">&#8594;</span>
      </a>

      <!-- Katzen -->
      <a href="./katzen/" class="project-row">
        <div class="project-info">
          <span class="project-name">Katzen</span>
          <span class="project-url">/katzen/</span>
        </div>
        <span class="project-arrow">&#8594;</span>
      </a>

    </div>
  </main>

  <footer>
    &copy; 2026 Die Kavallerie
  </footer>

</body>
</html>
