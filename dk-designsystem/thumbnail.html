<!DOCTYPE html>
<html lang="de"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0;padding:0}
  .tile{width:1280px;height:854px;display:flex;background:var(--color-black)}
  .main{flex:0 0 75%;display:flex;align-items:center;justify-content:center;padding:0 90px}
  .mark{font-family:var(--font-headline);color:var(--color-white);font-weight:900;text-transform:uppercase;line-height:.82;letter-spacing:-.02em;font-size:150px}
  .mark .k{color:var(--color-red)}
  .strip{flex:1;display:flex;flex-direction:column}
  .strip span{flex:1;display:block}
</style>
</head>
<body>
  <div class="tile">
    <div class="main"><div class="mark">DIE<br><span class="k">KAVALLERIE</span></div></div>
    <div class="strip">
      <span style="background:var(--color-yellow)"></span>
      <span style="background:var(--color-grey-light)"></span>
      <span style="background:var(--color-red)"></span>
    </div>
  </div>
</body></html>
