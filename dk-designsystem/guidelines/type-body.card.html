<!-- @dsCard group="Type" viewport="700x300" name="Helvetica Now — Body" subtitle="Base font · weights 400 & 700 · sentence case" -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; background: var(--color-grey-light); padding: 24px; box-sizing: border-box; }
    .row { display: flex; align-items: baseline; gap: 20px; border-bottom: 1px solid rgba(0,0,0,0.08); padding-bottom: 10px; margin-bottom: 10px; }
    .label { font-size: 11px; color: #888; min-width: 130px; flex-shrink: 0; }
    .sample { font-family: var(--font-base); color: var(--color-black); }
  </style>
</head>
<body>
  <div class="row">
    <span class="label">sub-headline · 14px</span>
    <span class="sample" style="font-size:14px; font-weight:400;">Als Kommunikationsagentur</span>
  </div>
  <div class="row">
    <span class="label">copy · 18px · 400</span>
    <span class="sample" style="font-size:18px; font-weight:400; line-height:1.2em;">Wir kreieren inspirierende Erlebnisse, die Menschen zusammenführen.</span>
  </div>
  <div class="row">
    <span class="label">copy · 18px · 700</span>
    <span class="sample" style="font-size:18px; font-weight:700; line-height:1.2em;">Bold emphasis in body copy.</span>
  </div>
  <div class="row">
    <span class="label">copy · 18px · italic</span>
    <span class="sample" style="font-size:18px; font-weight:400; font-style:italic; line-height:1.2em;">Italic body copy variant.</span>
  </div>
  <div class="row" style="border:none; margin:0; padding:0;">
    <span class="label">copy-2xsmall · 14px</span>
    <span class="sample" style="font-size:14px; font-weight:400;">Small print, labels, legal text</span>
  </div>
</body>
</html>
