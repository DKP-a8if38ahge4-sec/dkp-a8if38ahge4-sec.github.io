<!-- @dsCard group="Type" viewport="700x380" name="PP Formula — Display" subtitle="Headlines · weight 900 · uppercase · condensed" -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; background: var(--color-grey-light); padding: 24px; font-family: var(--font-base); box-sizing: border-box; }
    .row { display: flex; align-items: baseline; gap: 20px; border-bottom: 1px solid rgba(0,0,0,0.08); padding-bottom: 10px; margin-bottom: 10px; }
    .label { font-size: 11px; color: #888; min-width: 100px; flex-shrink: 0; }
    .sample { font-family: var(--font-headline); font-weight: 900; text-transform: uppercase; color: var(--color-black); line-height: 1; }
  </style>
</head>
<body>
  <div class="row"><span class="label">2xlarge · 75px</span><span class="sample" style="font-size:clamp(36px,7.5vw,75px);">Headline</span></div>
  <div class="row"><span class="label">xlarge · 55px</span><span class="sample" style="font-size:clamp(28px,5.5vw,55px);">Headline</span></div>
  <div class="row"><span class="label">large · 50px</span><span class="sample" style="font-size:clamp(26px,5vw,50px);">Headline Statement</span></div>
  <div class="row"><span class="label">medium · 30px</span><span class="sample" style="font-size:clamp(20px,3vw,30px);">Section Title Here</span></div>
  <div class="row"><span class="label">small · 20px</span><span class="sample" style="font-size:clamp(16px,2vw,20px);">Sub-section Heading</span></div>
  <div class="row" style="border:none; margin:0; padding:0;"><span class="label">h3 · 30px</span><span class="sample" style="font-size:30px;">Card Title</span></div>
</body>
</html>
